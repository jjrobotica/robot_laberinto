    function loadDefaultProgram(mode = currentMode) {
        if(!window.workspace) return;
        window.workspace.clear();
        Blockly.Xml.domToWorkspace(Blockly.utils.xml.textToDom(getDefaultProgramXml(mode)), window.workspace);
    }

    function getWorkspaceXmlText() {
        const xmlDom = Blockly.Xml.workspaceToDom(window.workspace);
        return Blockly.Xml.domToPrettyText(xmlDom);
    }

    function loadWorkspaceXmlText(xmlText) {
        const xmlDom = Blockly.utils.xml.textToDom(xmlText);
        window.workspace.clear();
        Blockly.Xml.domToWorkspace(xmlDom, window.workspace);
    }

    function getBlocksStorageKey(mode = currentMode) {
        return `${BLOCKS_STORAGE_PREFIX}${mode}`;
    }

    function isStaleAdvancedDefaultXml(xmlText) {
        if(!xmlText) return false;
        const looksLikeBundledAdvanced = xmlText.includes('centrar_robot') &&
            xmlText.includes('girar_derecha_90') &&
            xmlText.includes('girar_izquierda_90');
        if(!looksLikeBundledAdvanced) return false;
        return xmlText.includes('<field name="NUM">60</field>') ||
            xmlText.includes('<field name="NUM">160</field></block></value></block></value><statement name="DO1"') ||
            xmlText.includes('<field name="NUM">16</field></block></value></block></value><statement name="DO1"') ||
            xmlText.includes('<field name="NUM">8</field>') ||
            xmlText.includes('<value name="IF0"><block type="logic_compare"><field name="OP">GT</field><value name="A"><block type="ultrasonic_front"></block></value>');
    }

    function saveBlocks(mode = currentMode) {
        if(!window.workspace) return false;
        const xmlText = getWorkspaceXmlText();
        localStorage.setItem(getBlocksStorageKey(mode), xmlText);
        document.getElementById('status').textContent = `Estado: Bloques guardados (${mode === 'advanced' ? 'Avanzado' : 'Básico'})`;
        return true;
    }

    function loadBlocks(mode = currentMode, options = {}) {
        if(!window.workspace) return false;
        const xmlText = localStorage.getItem(getBlocksStorageKey(mode));
        if(!xmlText) {
            if(!options.silent) document.getElementById('status').textContent = "Estado: No hay bloques guardados para este modo";
            return false;
        }

        if(options.silent && mode === 'advanced' && isStaleAdvancedDefaultXml(xmlText)) {
            return false;
        }

        try {
            loadWorkspaceXmlText(xmlText);
            if(!options.silent) document.getElementById('status').textContent = `Estado: Bloques cargados (${mode === 'advanced' ? 'Avanzado' : 'Básico'})`;
            return true;
        } catch (error) {
            console.error(error);
            if(!options.silent) document.getElementById('status').textContent = "Error: XML guardado inválido";
            return false;
        }
    }

    function exportBlocksXml() {
        if(!window.workspace) return;
        const xmlText = getWorkspaceXmlText();
        const blob = new Blob([xmlText], { type: 'application/xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
        link.href = url;
        link.download = `robomaze-${currentMode}-${stamp}.xml`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        document.getElementById('status').textContent = "Estado: XML exportado";
    }

    function initBlockly() {
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox-basic'),
            scrollbars: true,
            trashcan: true
        });
        
        // Hacer las variables globales accesibles
        window.workspace = workspace;
        if(!loadBlocks('basic', { silent: true })) loadDefaultProgram('basic');
        window.addEventListener('resize', () => Blockly.svgResize(workspace));
        requestAnimationFrame(() => Blockly.svgResize(workspace));
    }

    function initLayoutShell() {
        setMobilePanel('sim');
        syncModeButtons();
        syncViewButtons();
        window.addEventListener('keydown', event => {
            if(event.key === 'Escape') closeSideMenu();
        });
        window.addEventListener('resize', () => {
            if(window.innerWidth > 900) closeSideMenu();
            if(window.workspace) requestAnimationFrame(() => Blockly.svgResize(window.workspace));
        });
    }

    // Inicializar cuando el documento esté listo
    document.addEventListener('DOMContentLoaded', function() {
        initLayoutShell();
        initBlockly();
        initRobotPlacement();
        initOrthoCameraControls();
        initFreeCameraPan();
        generateMaze();
    });
</script>
